[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[agents.product_manager]
description = "Planning lead that decomposes requests into actionable scope and acceptance criteria."
config_file = "../agents/product_manager.toml"

[agents.frontend_developer]
description = "Implementation-focused engineer for scoped frontend and application changes."
config_file = "../agents/frontend_developer.toml"

[agents.qa]
description = "Quality engineer focused on behavior regressions, tests, and verification plans."
config_file = "../agents/qa.toml"

[agents.devops]
description = "Delivery engineer focused on CI/CD, runtime checks, and release readiness."
config_file = "../agents/devops.toml"
